spring.application.name=saudememora

spring.datasource.url=jdbc:h2:file:./data/saudememora;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd


spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

groq.api.key=${GROQ_API_KEY:dummy-key-for-development}

ocr.space.api.key=${OCR_SPACE_API_KEY:dummy-key-for-development}